<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إلى ست الحبايب ❤️</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap');

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: radial-gradient(circle, #2a0505 0%, #000000 100%);
            font-family: 'Cairo', sans-serif;
            overflow: hidden;
            color: white;
            text-align: center;
        }

        #enter-btn {
            padding: 20px 60px;
            font-size: 1.8rem;
            background: linear-gradient(45deg, #ff4d4d, #ff1a1a);
            border: none;
            color: white;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 0 40px rgba(255, 77, 77, 0.6);
            transition: 0.5s;
            z-index: 100;
            font-weight: bold;
        }

        #enter-btn:hover { transform: scale(1.1); box-shadow: 0 0 60px #ff4d4d; }

        .main-stage { display: none; width: 90%; }

        .heart-container {
            position: relative;
            width: 150px;
            height: 150px;
            margin: 0 auto 40px;
            animation: pulse 1.2s infinite;
        }

        .heart-shape {
            background-color: #ff4d4d;
            display: inline-block;
            height: 80px;
            position: relative;
            transform: rotate(-45deg);
            width: 80px;
            box-shadow: 0 0 80px #ff4d4d;
        }

        .heart-shape:before, .heart-shape:after {
            content: "";
            background-color: #ff4d4d;
            border-radius: 50%;
            height: 80px;
            position: absolute;
            width: 80px;
        }

        .heart-shape:before { top: -40px; left: 0; }
        .heart-shape:after { left: 40px; top: 0; }

        @keyframes pulse {
            0%, 100% { transform: scale(1); filter: brightness(1); }
            50% { transform: scale(1.2); filter: brightness(1.3); }
        }

        h1 { font-size: 2.5rem; margin: 20px 0; text-shadow: 0 0 20px #ff4d4d; }
        p { font-size: 1.4rem; color: #ffcccc; line-height: 1.8; }

        .floating-heart {
            position: absolute;
            color: rgba(255, 77, 77, 0.8);
            pointer-events: none;
            z-index: 1;
            animation: drift linear forwards;
        }

        @keyframes drift {
            0% { transform: translateY(110vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body>

    <button id="enter-btn">اضغطي هنا يا ست الكل ❤️</button>

    <div class="main-stage" id="stage">
        <div class="heart-container">
            <div class="heart-shape"></div>
        </div>
        <h1>كل سنة وأنتِ طيبة يا أمي ❤️</h1>
        <p>الأيام اللي عشتيها معايا.. فعلاً مبيتنسيش</p>
    </div>

    <audio id="bg-music" loop preload="auto">
        <source src="https://www.mboxdrive.com/Tamer-Hosny-Ommy-Thom-Ommy.mp3" type="audio/mpeg">
    </audio>

    <script>
        const btn = document.getElementById('enter-btn');
        const stage = document.getElementById('stage');
        const audio = document.getElementById('bg-music');

        btn.onclick = function() {
            btn.style.display = 'none';
            stage.style.display = 'block';
            
            // تشغيل الأغنية من اللينك
            audio.play().then(() => {
                console.log("الأغنية بدأت بنجاح من الرابط الخارجي!");
            }).catch(e => {
                // محاولة أخيرة لو المتصفح معصلج
                audio.muted = false;
                audio.play();
            });
            
            createHearts();
        };

        function createHearts() {
            setInterval(() => {
                const heart = document.createElement('div');
                heart.innerHTML = '❤️';
                heart.className = 'floating-heart';
                heart.style.left = Math.random() * 100 + 'vw';
                heart.style.fontSize = (Math.random() * 20 + 20) + 'px';
                heart.style.animationDuration = (Math.random() * 3 + 4) + 's';
                document.body.appendChild(heart);
                setTimeout(() => heart.remove(), 7000);
            }, 300);
        }
    </script>
</body>
</html>
