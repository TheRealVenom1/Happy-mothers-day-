<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إلى ست الحبايب ❤️</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: radial-gradient(circle, #1a0a0a 0%, #000000 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            color: white;
            text-align: center;
        }

        #enter-btn {
            padding: 20px 50px;
            font-size: 1.6rem;
            background: #ff4d4d;
            border: none;
            color: white;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 0 30px rgba(255, 77, 77, 0.8);
            transition: 0.4s;
            z-index: 100;
            font-weight: bold;
        }

        #enter-btn:hover { transform: scale(1.1); box-shadow: 0 0 60px #ff4d4d; }

        .main-stage { display: none; }

        /* تأثير القلب المضيء */
        .heart-container {
            position: relative;
            width: 150px;
            height: 150px;
            margin: 0 auto 30px;
            animation: pulse 1.5s infinite;
        }

        .heart-shape {
            background-color: #ff4d4d;
            display: inline-block;
            height: 80px;
            position: relative;
            transform: rotate(-45deg);
            width: 80px;
            box-shadow: 0 0 60px #ff4d4d;
        }

        .heart-shape:before, .heart-shape:after {
            content: "";
            background-color: #ff4d4d;
            border-radius: 50%;
            height: 80px;
            position: absolute;
            width: 80px;
        }

        .heart-shape:before { top: -40px; left: 0; }
        .heart-shape:after { left: 40px; top: 0; }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.15); }
        }

        h1 { font-size: 2.8rem; margin: 20px 0; text-shadow: 0 0 20px #ff4d4d; }
        p { font-size: 1.6rem; color: #ffcccc; margin-bottom: 20px; }

        .floating-heart {
            position: absolute;
            color: rgba(255, 77, 77, 0.8);
            font-size: 24px;
            pointer-events: none;
            z-index: 1;
            animation: drift linear forwards;
        }

        @keyframes drift {
            0% { transform: translateY(110vh) rotate(0); opacity: 1; }
            100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body>

    <button id="enter-btn">اضغطي هنا يا ست الكل ❤️</button>

    <div class="main-stage" id="stage">
        <div class="heart-container">
            <div class="heart-shape"></div>
        </div>
        <h1>كل سنة وأنتِ طيبة يا أمي ❤️</h1>
        <p>الأيام اللي عشتيها معايا.. فعلاً مبيتنسيش</p>
    </div>

    <audio id="bg-music" loop preload="auto">
        <source src="tamer_v.mp3" type="audio/mpeg">
    </audio>

    <script>
        const btn = document.getElementById('enter-btn');
        const stage = document.getElementById('stage');
        const audio = document.getElementById('bg-music');

        btn.onclick = function() {
            btn.style.display = 'none';
            stage.style.display = 'block';
            
            // محاولة تشغيل الأغنية
            audio.play().then(() => {
                console.log("شغالة يا وحش!");
            }).catch(e => {
                console.log("المتصفح محتاج تفاعل، بنحاول تاني...");
                audio.muted = false;
                audio.play();
            });
            
            createHearts();
        };

        function createHearts() {
            setInterval(() => {
                const heart = document.createElement('div');
                heart.innerHTML = '❤️';
                heart.className = 'floating-heart';
                heart.style.left = Math.random() * 100 + 'vw';
                heart.style.fontSize = (Math.random() * 20 + 20) + 'px';
                heart.style.animationDuration = (Math.random() * 3 + 4) + 's';
                document.body.appendChild(heart);
                setTimeout(() => heart.remove(), 7000);
            }, 350);
        }
    </script>
</body>
</html>
