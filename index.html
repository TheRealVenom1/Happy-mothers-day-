<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إلى ست الحبايب ❤️</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #1a0a0a 0%, #3d0505 50%, #000000 100%);
            font-family: 'Cairo', sans-serif;
            overflow: hidden;
            color: white;
            text-align: center;
        }

        /* زرار الدخول الرومانسي */
        #enter-btn {
            padding: 18px 40px;
            font-size: 1.5rem;
            background: #ff4d4d;
            border: none;
            color: white;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 0 30px rgba(255, 77, 77, 0.6);
            transition: 0.4s;
            z-index: 100;
        }

        #enter-btn:hover {
            transform: scale(1.1);
            background: #ff1a1a;
            box-shadow: 0 0 50px #ff4d4d;
        }

        .main-stage { display: none; }

        /* تأثير القلب المضيء */
        .heart-container {
            position: relative;
            width: 150px;
            height: 150px;
            margin: 0 auto 30px;
            animation: pulse 1.5s infinite;
        }

        .heart-shape {
            background-color: #ff4d4d;
            display: inline-block;
            height: 80px;
            position: relative;
            top: 0;
            transform: rotate(-45deg);
            width: 80px;
            box-shadow: 0 0 60px #ff4d4d;
        }

        .heart-shape:before, .heart-shape:after {
            content: "";
            background-color: #ff4d4d;
            border-radius: 50%;
            height: 80px;
            position: absolute;
            width: 80px;
        }

        .heart-shape:before { top: -40px; left: 0; }
        .heart-shape:after { left: 40px; top: 0; }

        @keyframes pulse {
            0% { transform: scale(1); filter: drop-shadow(0 0 10px #ff4d4d); }
            50% { transform: scale(1.15); filter: drop-shadow(0 0 30px #ff4d4d); }
            100% { transform: scale(1); filter: drop-shadow(0 0 10px #ff4d4d); }
        }

        h1 {
            font-size: 3rem;
            margin: 20px 0;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
            animation: fadeInDown 2s;
        }

        p {
            font-size: 1.5rem;
            color: #ffcccc;
            animation: fadeInUp 3s;
        }

        /* قلوب طايرة في الخلفية */
        .floating-heart {
            position: absolute;
            color: rgba(255, 77, 77, 0.7);
            font-size: 24px;
            pointer-events: none;
            z-index: 1;
        }

        @keyframes drift {
            0% { transform: translateY(110vh) translateX(0) rotate(0); opacity: 1; }
            100% { transform: translateY(-10vh) translateX(100px) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body>

    <button id="enter-btn">اضغطي هنا يا أغلى الناس ❤️</button>

    <div class="main-stage" id="stage">
        <div class="heart-container">
            <div class="heart-shape"></div>
        </div>
        <h1>كل سنة وأنتِ طيبة يا ست الكل ❤️</h1>
        <p>يا نور عيني يا أغلى من حياتي.. ربنا يبارك في عمرك</p>
    </div>

    <audio id="tamer-song" loop>
        <source src="tamer.mp3" type="audio/mpeg">
    </audio>

    <script>
        const btn = document.getElementById('enter-btn');
        const stage = document.getElementById('stage');
        const audio = document.getElementById('tamer-song');

        btn.onclick = function() {
            btn.style.display = 'none';
            stage.style.display = 'block';
            audio.play().catch(e => console.log("تحتاج لإضافة ملف tamer.mp3 بجانب الكود"));
            createHearts();
        };

        function createHearts() {
            setInterval(() => {
                const heart = document.createElement('div');
                heart.innerHTML = '❤️';
                heart.className = 'floating-heart';
                heart.style.left = Math.random() * 100 + 'vw';
                heart.style.fontSize = (Math.random() * 20 + 20) + 'px';
                heart.style.animation = `drift ${Math.random() * 3 + 4}s linear forwards`;
                document.body.appendChild(heart);
                setTimeout(() => heart.remove(), 7000);
            }, 400);
        }
    </script>
</body>
</html>
