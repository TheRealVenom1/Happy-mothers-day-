<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إلى أغلى إنسانة في حياتي</title>
    <style>
        /* CSS Style */
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #0d0d0d; /* خلفية داكنة وفخمة */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            color: white;
        }

        .container {
            text-align: center;
        }

        /* رسم القلب بالـ CSS */
        .heart-box {
            position: relative;
            width: 100px;
            height: 90px;
            margin: 0 auto 50px;
            animation: beat 1.2s infinite ease-in-out;
        }

        .heart {
            position: absolute;
            width: 50px;
            height: 80px;
            background-color: #ff4d4d;
            border-radius: 50px 50px 0 0;
            transform: rotate(-45deg);
            transform-origin: 0 100%;
            left: 50px;
            box-shadow: 0 0 40px #ff4d4d;
            animation: drawHeart 2s ease-out forwards;
        }

        .heart::after {
            content: '';
            position: absolute;
            width: 50px;
            height: 80px;
            background-color: #ff4d4d;
            border-radius: 50px 50px 0 0;
            transform: rotate(90deg);
            transform-origin: 0 100%;
            left: 0;
        }

        /* أنيميشن رسم ونبض القلب */
        @keyframes drawHeart {
            0% { opacity: 0; transform: rotate(-45deg) scale(0); }
            100% { opacity: 1; transform: rotate(-45deg) scale(1); }
        }

        @keyframes beat {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        /* تنسيق الكلام */
        .message {
            font-size: 2.2rem;
            font-weight: bold;
            text-shadow: 2px 2px 10px rgba(255, 77, 77, 0.5);
            opacity: 0;
            animation: fadeIn 2s ease-in forwards 1.5s;
            line-height: 1.6;
        }

        .sub-message {
            margin-top: 20px;
            font-size: 1.3rem;
            color: #ccc;
            opacity: 0;
            animation: fadeIn 2s ease-in forwards 3s;
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }

        /* تأثير جزيئات متطايرة بسيطة */
        .sparkle {
            position: absolute;
            background: white;
            border-radius: 50%;
            opacity: 0.5;
            animation: move-sparkle 5s linear infinite;
        }

        @keyframes move-sparkle {
            0% { transform: translateY(0); opacity: 0.5; }
            100% { transform: translateY(-100vh); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="heart-box">
            <div class="heart"></div>
        </div>

        <div class="message">
            كل سنة وأنتِ طيبة يا أغلى من روحي ❤️
        </div>
        <div class="sub-message">
            أنتِ الحب، الحنان، والأمان.. ربنا يخليكي ليا يا أمي.
        </div>
    </div>

    <script>
        // إضافة بعض اللمسات الجمالية (نجوم صغيرة خلفية)
        function createSparkle() {
            const sparkle = document.createElement('div');
            sparkle.classList.add('sparkle');
            sparkle.style.left = Math.random() * 100 + 'vw';
            sparkle.style.top = '100vh';
            const size = Math.random() * 3 + 1 + 'px';
            sparkle.style.width = size;
            sparkle.style.height = size;
            sparkle.style.animationDuration = Math.random() * 3 + 2 + 's';
            
            document.body.appendChild(sparkle);
            
            setTimeout(() => {
                sparkle.remove();
            }, 5000);
        }

        setInterval(createSparkle, 200);
    </script>
</body>
</html>
